<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQW Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-spacer"></div>
        
        <!-- El botón ahora incluye una imagen para la bandera y un span para el texto -->
        <button id="btn-idioma" class="idioma-selector">
            <img id="btn-idioma-flag" src="flag-es.png" alt="Flag" class="flag-icon-btn">
            <span id="btn-idioma-texto">Español</span>
        </button>
    </header>




    <section class="search-bar">
        <span class="search-title">BUSCAR POR:</span>
        <input type="text" id="search-input" placeholder="Escribe un nombre..." class="input-search-text">
        <!-- Nuevos botones de ordenamiento con flechas limpias -->
        <button id="btn-orden-mayor" class="btn-search">Nivel 🡅</button>
        <button id="btn-orden-menor" class="btn-search">Nivel 🡇</button>
    </section>

    <main class="vault-container">
        <!-- Contenedor dinámico de cuentas -->
        <div id="lista-cuentas"></div>

        <!-- Botón para añadir cuenta nueva (+) -->
        <div class="add-account-slot" id="btn-nueva-cuenta">
            <div class="add-icon">+</div>
            <p>Nueva Cuenta</p>
        </div>
    </main>

    <!-- --- VENTANA MODAL / FORMULARIO --- -->
    <div id="modal-formulario" class="modal">
        <div class="modal-content">
            <h2 id="modal-titulo" class="title-class" style="margin-bottom: 20px;">AGREGAR PERSONAJE</h2>
            
            <div class="form-grid">
                <!-- Columna Datos -->
                <div class="form-column">
                    <label>Nivel:</label>
                    <input type="number" id="form-nivel" value="100" min="1" max="100">

                    <label>Nombre:</label>
                    <input type="text" id="form-nombre" placeholder="Ej: Blem" maxlength="20">

                    <label>Contraseña:</label>
                    <input type="password" id="form-contrasena" maxlength="40">
                    
                    <label>Correo:</label>
                    <input type="email" id="form-correo" maxlength="40">

                    <label>Oro:</label>
                    <input type="text" id="form-oro" value="0" maxlength="11">

                    <label>ACs:</label>
                    <input type="text" id="form-acs" value="0" maxlength="11">

                    <!-- Campo de Foto -->
                    <label>Foto de Perfil:</label>
                    <button id="btn-cambiar-foto" class="btn-search" style="width: 100%; margin-top: 5px;">Seleccionar Foto 📷</button>
                    <input type="hidden" id="form-foto-ruta" value="">
                </div>

                <!-- Columna Clases -->
                <div class="form-column">
                    <h3 class="title-class">CLASS</h3>
                    <label><input type="checkbox" class="check-clase" value="ArchFiend"> ArchFiend</label>
                    <label><input type="checkbox" class="check-clase" value="ArchPaladin"> ArchPaladin</label>
                    <label><input type="checkbox" class="check-clase" value="VoidHighlord"> VoidHighlord</label>
                    <label><input type="checkbox" class="check-clase" value="Dragon of Time"> Dragon of Time</label>
                    <label><input type="checkbox" class="check-clase" value="Lord of Order"> Lord of Order</label>
                    <label><input type="checkbox" class="check-clase" value="ArchMage"> ArchMage</label>
                    <label><input type="checkbox" class="check-clase" value="Shaman"> Shaman</label>
                    <label><input type="checkbox" class="check-clase" value="+27 Classes"> +27 Classes</label>
                </div>

                <!-- Columna Ítems y Enchants Juntos -->
                <div class="form-column">
                    <!-- Sección de Items -->
                    <h3 class="title-item">ITEM</h3>
                    <label><input type="checkbox" class="check-item" value="Blod"> Blod</label>
                    <label><input type="checkbox" class="check-item" value="DK Armor"> DK Armor</label>
                    <label><input type="checkbox" class="check-item" value="Awescencion Set"> Awescencion Set</label>
                    
                    <!-- Sección de Enchants (Separada por un margen superior) -->
                    <h3 class="title-enchant" style="color: #ffaa00; font-size: 1rem; margin: 15px 0 10px 0;">ENCHANT</h3>
                    <label><input type="checkbox" class="check-enchant" value="Full Forge"> Full Forge</label>
                    <label><input type="checkbox" class="check-enchant" value="Valiance"> Valiance</label>
                </div>


            <!-- Botones Guardar / Cancelar -->
            <div class="form-buttons">
                <button id="btn-cancelar" class="btn-form-cancelar">CANCELAR</button>
                <button id="btn-guardar" class="btn-form-guardar">GUARDAR</button>
            </div>
        </div>
    </div>

    <script>
        const listaCuentasContainer = document.getElementById('lista-cuentas');
        const btnNuevaCuenta = document.getElementById('btn-nueva-cuenta');
        const modalFormulario = document.getElementById('modal-formulario');
        const modalTitulo = document.getElementById('modal-titulo');
        const btnCancelar = document.getElementById('btn-cancelar');
        const btnGuardar = document.getElementById('btn-guardar');
        const btnCambiarFoto = document.getElementById('btn-cambiar-foto');
        const formFotoRuta = document.getElementById('form-foto-ruta');

        // Variable global para rastrear si estamos editando un personaje o creando uno nuevo
        let idEdicionActual = null;
          // Variable global para el idioma actual ('es' o 'en')
        let idiomaActual = 'es';

        // Diccionario con todas las traducciones de la interfaz
        const traducciones = {
            es: {
                buscarPor: "BUSCAR POR:",
                placeholderBuscar: "Escribe un nombre...",
                nuevaCuenta: "Nueva Cuenta",
                noCuentas: "No hay cuentas guardadas aún.",
                noResultados: "No se encontraron personajes con los filtros aplicados.",
                tituloAgregar: "AGREGAR PERSONAJE",
                tituloEditar: "EDITAR PERSONAJE",
                labelNivel: "Nivel:",
                labelNombre: "Nombre:",
                labelContrasena: "Contraseña:",
                labelCorreo: "Correo:",
                labelOro: "Oro:",
                labelAcs: "ACs:",
                labelFoto: "Foto de Perfil:",
                btnSeleccionarFoto: "Seleccionar Foto 📷",
                btnFotoCargada: "¡Foto Cargada! ✅",
                btnCambiarFoto: "Cambiar Foto 📷",
                btnCancelar: "CANCELAR",
                btnGuardar: "GUARDAR",
                btnCopiar: "Copiar",
                statOro: "💰 Oro:",
                statAcs: "💎 ACs:",
                btnIdiomaTexto: "Español",
                btnOrdenMayorTexto: "Nivel 🡅",
                btnOrdenMenorTexto: "Nivel 🡇",
                alertaBorrar: '¿Estás seguro de que deseas eliminar al personaje "{nombre}"?'
            },
            en: {
                buscarPor: "SEARCH BY:",
                placeholderBuscar: "Type a name...",
                nuevaCuenta: "New Account",
                noCuentas: "No accounts saved yet.",
                noResultados: "No characters found with the applied filters.",
                tituloAgregar: "ADD CHARACTER",
                tituloEditar: "EDIT CHARACTER",
                labelNivel: "Level:",
                labelNombre: "Name:",
                labelContrasena: "Password:",
                labelCorreo: "Email:",
                labelOro: "Gold:",
                labelAcs: "ACs:",
                labelFoto: "Profile Picture:",
                btnSeleccionarFoto: "Select Photo 📷",
                btnFotoCargada: "Photo Loaded! ✅",
                btnCambiarFoto: "Change Photo 📷",
                btnCancelar: "CANCEL", // <-- ¡Aquí estaba el error corregido!
                btnGuardar: "SAVE",
                btnCopiar: "Copy",
                statOro: "💰 Gold:",
                statAcs: "💎 ACs:",
                btnIdiomaTexto: "English",
                btnOrdenMayorTexto: "Level 🡅",
                btnOrdenMenorTexto: "Level 🡇",
                alertaBorrar: 'Are you sure you want to delete the character "{nombre}"?'
            }
        };


        // Capturamos el botón de idioma
        const btnIdioma = document.getElementById('btn-idioma');

        // Evento para alternar entre Español e Inglés
        // Evento para alternar entre Español e Inglés
        btnIdioma.addEventListener('click', async () => {
            idiomaActual = (idiomaActual === 'es') ? 'en' : 'es';
            
            // --- NUEVA LÍNEA: Guarda el nuevo idioma de forma persistente en db.json ---
            await window.api.guardarIdioma(idiomaActual);
            
            // Forzar a la aplicación a redibujar todo con los nuevos textos y banderas
            actualizarTextosEstaticos();
            actualizarInterfaz();
        });


        
        function actualizarTextosEstaticos() {
            const t = traducciones[idiomaActual];
            
            // Actualizar el texto y la bandera del botón superior dinámicamente
            document.getElementById('btn-idioma-texto').innerText = t.btnIdiomaTexto;
            document.getElementById('btn-idioma-flag').src = `flag-${idiomaActual}.png`;
            
            // 1. Traducir Barra de Búsqueda
            document.querySelector('.search-title').innerText = t.buscarPor;
            document.getElementById('search-input').placeholder = t.placeholderBuscar;
            document.getElementById('btn-orden-mayor').innerText = t.btnOrdenMayorTexto;
            document.getElementById('btn-orden-menor').innerText = t.btnOrdenMenorTexto;
            
            
            // 2. Traducir el botón de "Nueva Cuenta" abajo
            document.querySelector('#btn-nueva-cuenta p').innerText = t.nuevaCuenta;

            // 3. Traducir los botones principales del formulario Modal
            document.getElementById('btn-cancelar').innerText = t.btnCancelar;
            document.getElementById('btn-guardar').innerText = t.btnGuardar;

            // 4. Traducir las etiquetas (<label>) del formulario Modal de forma exacta y segura
            const modal = document.getElementById('modal-formulario');
            const labels = modal.getElementsByTagName('label');
            
            if (labels.length >= 7) {
                labels[0].innerText = t.labelNivel;
                labels[1].innerText = t.labelNombre;
                labels[2].innerText = t.labelContrasena;
                labels[3].innerText = t.labelCorreo;
                labels[4].innerText = t.labelOro;
                labels[5].innerText = t.labelAcs;
                labels[6].innerText = t.labelFoto;
            }

            // 5. Traducir el botón de seleccionar foto dentro del formulario
            const btnFoto = document.getElementById('btn-cambiar-foto');
            const rutaFotoActual = document.getElementById('form-foto-ruta').value;

            if (rutaFotoActual !== "") {
                btnFoto.innerText = t.btnFotoCargada;
            } else {
                btnFoto.innerText = idEdicionActual ? t.btnCambiarFoto : t.btnSeleccionarFoto;
            }
        }


        window.addEventListener('DOMContentLoaded', async () => {
            // 1. Preguntar a Lowdb qué idioma estaba guardado
            idiomaActual = await window.api.obtenerIdioma();
            
            // 2. Actualizar visualmente el botón de la bandera
            const btnIdiomaFlag = document.getElementById('btn-idioma-flag');
            const btnIdiomaTexto = document.getElementById('btn-idioma-texto');
            btnIdiomaTexto.innerText = traducciones[idiomaActual].btnIdiomaTexto;
            btnIdiomaFlag.src = `flag-${idiomaActual}.png`;

            // 3. Renderizar todo el programa de forma normal
            actualizarTextosEstaticos();
            actualizarInterfaz();
        });


        // ====================================================
        // AQUÍ VA EL PASO 2: LÓGICA DE FILTRADO
        // ====================================================
        const searchInput = document.getElementById('search-input');
        const btnOrdenMayor = document.getElementById('btn-orden-mayor');
        const btnOrdenMenor = document.getElementById('btn-orden-menor');

        let modoOrdenActual = null;

        searchInput.addEventListener('input', () => {
            actualizarInterfaz();
        });

        // Evento para ordenar de Mayor a Menor (Nivel 🡅)
        btnOrdenMayor.addEventListener('click', () => {
            if (modoOrdenActual === 'mayor') {
                modoOrdenActual = null; // Si ya estaba activo, se desactiva
            } else {
                modoOrdenActual = 'mayor';
            }
            actualizarEstilosBotonesOrden();
            actualizarInterfaz();
        });

        // Evento para ordenar de Menor a Mayor (Nivel 🡇)
        btnOrdenMenor.addEventListener('click', () => {
            if (modoOrdenActual === 'menor') {
                modoOrdenActual = null; // Si ya estaba activo, se desactiva
            } else {
                modoOrdenActual = 'menor';
            }
            actualizarEstilosBotonesOrden();
            actualizarInterfaz();
        });

        // Función auxiliar para encender con tu neón morado el botón que esté activo
        function actualizarEstilosBotonesOrden() {
            // Resetear ambos botones primero
            btnOrdenMayor.style.borderColor = '#5a337a';
            btnOrdenMayor.style.boxShadow = 'none';
            btnOrdenMenor.style.borderColor = '#5a337a';
            btnOrdenMenor.style.boxShadow = 'none';

            // Iluminar el que corresponda
            if (modoOrdenActual === 'mayor') {
                btnOrdenMayor.style.borderColor = '#a020f0';
                btnOrdenMayor.style.boxShadow = '0 0 10px #a020f0';
            } else if (modoOrdenActual === 'menor') {
                btnOrdenMenor.style.borderColor = '#a020f0';
                btnOrdenMenor.style.boxShadow = '0 0 10px #a020f0';
            }
        }
        // ====================================================
        // Evento para abrir el buscador de archivos al crear/editar
        btnCambiarFoto.addEventListener('click', async () => {
            const ruta = await window.api.seleccionarFoto();
            if (ruta) {
                formFotoRuta.value = ruta;
                btnCambiarFoto.innerText = "¡Foto Cargada! ✅";
            }
        });

        // Abrir formulario para crear NUEVA cuenta
        btnNuevaCuenta.addEventListener('click', () => {
            idEdicionActual = null; 
            modalTitulo.innerText = traducciones[idiomaActual].tituloAgregar;
            limpiarFormulario();
            actualizarTextosEstaticos(); // <-- Añade esta línea aquí
            modalFormulario.style.display = 'flex';
        });

        btnCancelar.addEventListener('click', () => {
            modalFormulario.style.display = 'none';
        });

        // Guardar o Actualizar Datos
        btnGuardar.addEventListener('click', async () => {
            const clasesSeleccionadas = [];
            document.querySelectorAll('.check-clase:checked').forEach(el => clasesSeleccionadas.push(el.value));

            const itemsSeleccionados = [];
            document.querySelectorAll('.check-item:checked').forEach(el => itemsSeleccionados.push(el.value));

            const enchantsSeleccionados = [];
            document.querySelectorAll('.check-enchant:checked').forEach(el => enchantsSeleccionados.push(el.value));

            const cuentaData = {
                id: idEdicionActual ? idEdicionActual : Date.now(), 
                nivel: document.getElementById('form-nivel').value || 1,
                nombre: document.getElementById('form-nombre').value || "Sin Nombre",
                contrasena: document.getElementById('form-contrasena').value || "",
                correo: document.getElementById('form-correo').value || "N/A",
                oro: document.getElementById('form-oro').value || "0",
                acs: document.getElementById('form-acs').value || "0",
                clases: clasesSeleccionadas,
                items: itemsSeleccionados,
                enchants: enchantsSeleccionados, // <- Nueva línea
                foto: formFotoRuta.value || ""
            };

            await window.api.guardarCuenta(cuentaData);
            modalFormulario.style.display = 'none';
            actualizarInterfaz();
        });

        // Función para abrir la edición de un personaje existente
        async function prepararEdicion(id) {
            const cuentas = await window.api.obtenerCuentas();
            const cuenta = cuentas.find(c => c.id === id);

            if (!cuenta) return;

            idEdicionActual = cuenta.id; // Guardamos el ID que se está modificando
            modalTitulo.innerText = traducciones[idiomaActual].tituloEditar;

            // Rellenar campos del formulario con los datos guardados
            document.getElementById('form-nivel').value = cuenta.nivel;
            document.getElementById('form-nombre').value = cuenta.nombre;
            document.getElementById('form-contrasena').value = cuenta.contrasena;
            document.getElementById('form-correo').value = cuenta.correo;
            document.getElementById('form-oro').value = cuenta.oro;
            document.getElementById('form-acs').value = cuenta.acs;
            formFotoRuta.value = cuenta.foto || "";

            // Marcar checkboxes guardados
            document.querySelectorAll('.check-clase').forEach(el => {
                el.checked = cuenta.clases.includes(el.value);
            });
            document.querySelectorAll('.check-item').forEach(el => {
                el.checked = cuenta.items.includes(el.value);
            });
                        document.querySelectorAll('.check-enchant').forEach(el => {
                el.checked = cuenta.enchants ? cuenta.enchants.includes(el.value) : false;
            });


            // Forzar actualización de textos estáticos y del botón de foto según el idioma activo
            actualizarTextosEstaticos();

            modalFormulario.style.display = 'flex';
        }

        // Función para borrar un personaje definitivamente
        async function borrarPersonaje(id, nombre) {
            const mensaje = traducciones[idiomaActual].alertaBorrar.replace("{nombre}", nombre);
            const confirmar = confirm(mensaje);
            if (confirmar) {
                await window.api.borrarCuenta(id);
                actualizarInterfaz();
            }
        }


        function limpiarFormulario() {
            document.getElementById('form-nivel').value = "100";
            document.getElementById('form-nombre').value = "";
            document.getElementById('form-contrasena').value = "";
            document.getElementById('form-correo').value = "";
            document.getElementById('form-oro').value = "0";
            document.getElementById('form-acs').value = "0";
            document.querySelectorAll('.check-clase, .check-item, .check-enchant').forEach(el => el.checked = false);
            formFotoRuta.value = "";
            btnCambiarFoto.innerText = "Seleccionar Foto 📷";
        }
        
        async function actualizarInterfaz() {
            // Cambiamos 'const' por 'let' para poder reordenar y filtrar el arreglo
            let cuentas = await window.api.obtenerCuentas();
            listaCuentasContainer.innerHTML = ""; 

            // 1. Filtrar por texto del buscador (Nombre)
            const textoBusqueda = searchInput.value.toLowerCase().trim();
            if (textoBusqueda !== "") {
                cuentas = cuentas.filter(cuenta => cuenta.nombre.toLowerCase().includes(textoBusqueda));
            }

            // 2. APLICAR ORDENAMIENTO DE NIVEL SEGÚN EL MODO ACTIVO
            if (modoOrdenActual === 'mayor') {
                // De mayor a menor (Ej: 100, 90, 50...)
                cuentas.sort((a, b) => parseInt(b.nivel) - parseInt(a.nivel));
            } else if (modoOrdenActual === 'menor') {
                // De menor a mayor (Ej: 1, 15, 80...)
                cuentas.sort((a, b) => parseInt(a.nivel) - parseInt(b.nivel));
            }

            // Mensaje si no hay resultados que coincidan con la búsqueda
            if (cuentas.length === 0) {
                const msg = searchInput.value ? traducciones[idiomaActual].noResultados : traducciones[idiomaActual].noCuentas;
                listaCuentasContainer.innerHTML = `<p style="color: #666; text-align: center; margin-top: 10px;">${msg}</p>`;
                return;
            }

            // A partir de aquí tu cuentas.forEach(cuenta => { ... }) se queda exactamente igual abajo...

            // Mapeo dinámico de las tarjetas con la estructura Grid corregida
            cuentas.forEach(cuenta => {
                const slotHTML = `
                    <div class="account-slot">
                        <div class="char-info">
                            <!-- Nivel traducido dinámicamente -->
                            <span class="level-badge">⭐ ${traducciones[idiomaActual].labelNivel} ${cuenta.nivel}</span>
                            <div class="char-layout">
                                ${cuenta.foto 
                                    ? `<img src="file://${cuenta.foto}" class="photo-placeholder" style="object-fit: cover; border-style: solid;">` 
                                    : `<img src="default.png" class="photo-placeholder" style="object-fit: cover; border-style: solid;">`
                                }
                                <div class="data-text">
                                    <p><strong>${traducciones[idiomaActual].labelNombre}</strong> ${cuenta.nombre} <button class="btn-copy" onclick="ejecutarCopia('${cuenta.nombre}', this)">${traducciones[idiomaActual].btnCopiar} 📋</button></p>
                                    <p><strong>${traducciones[idiomaActual].labelContrasena}</strong> •••••••• <button class="btn-copy" onclick="ejecutarCopia('${cuenta.contrasena}', this)">${traducciones[idiomaActual].btnCopiar} 📋</button></p>
                                    <p><strong>${traducciones[idiomaActual].labelCorreo}</strong> ${cuenta.correo} <button class="btn-copy" onclick="ejecutarCopia('${cuenta.correo}', this)">${traducciones[idiomaActual].btnCopiar} 📋</button></p>
                                    
                                    <!-- CONTENEDORES DE FINANZAS CORREGIDOS -->
                                    <div class="stat-row">
                                        <img src="icon-gold.png" class="stat-icon-game" alt="Gold">
                                        <span class="stat-gold">${Number(cuenta.oro).toLocaleString('es-ES')}g</span>
                                    </div>
                                    <div class="stat-row">
                                        <img src="icon-acs.png" class="stat-icon-game" alt="ACs">
                                        <span class="stat-acs">${Number(cuenta.acs).toLocaleString('es-ES')}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="checkbox-group">
                            <h3 class="title-class">CLASS</h3>
                            <label><input type="checkbox" ${cuenta.clases.includes('ArchFiend') ? 'checked' : ''} disabled> ArchFiend</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('ArchPaladin') ? 'checked' : ''} disabled> ArchPaladin</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('VoidHighlord') ? 'checked' : ''} disabled> VoidHighlord</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('Dragon of Time') ? 'checked' : ''} disabled> Dragon of Time</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('Lord of Order') ? 'checked' : ''} disabled> Lord of Order</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('ArchMage') ? 'checked' : ''} disabled> ArchMage</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('Shaman') ? 'checked' : ''} disabled> Shaman</label>
                            <label><input type="checkbox" ${cuenta.clases.includes('+27 Classes') ? 'checked' : ''} disabled> +27 Classes</label>
                        </div>

                        <div class="checkbox-group">
                            <h3 class="title-item">ITEM</h3>
                            <label><input type="checkbox" ${cuenta.items.includes('Blod') ? 'checked' : ''} disabled> Blod</label>
                            <label><input type="checkbox" ${cuenta.items.includes('DK Armor') ? 'checked' : ''} disabled> DK Armor</label>
                            <label><input type="checkbox" ${cuenta.items.includes('Awescencion Set') ? 'checked' : ''} disabled> Awescencion Set</label>
                            
                            <h3 class="title-enchant" style="color: #ffaa00; margin-top: 15px;">ENCHANT</h3>
                            <label><input type="checkbox" ${cuenta.enchants && cuenta.enchants.includes('Full Forge') ? 'checked' : ''} disabled> Full Forge</label>
                            <label><input type="checkbox" ${cuenta.enchants && cuenta.enchants.includes('Valiance') ? 'checked' : ''} disabled> Valiance</label>
                            
                            <div class="action-buttons">
                                <button class="btn-action edit" onclick="prepararEdicion(${cuenta.id})" title="Editar">✏️</button>
                                <button class="btn-action delete" onclick="borrarPersonaje(${cuenta.id}, '${cuenta.nombre}')" title="Borrar">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
                listaCuentasContainer.innerHTML += slotHTML;
            });
        }

        // ====================================================
        // FUNCIÓN INTERMEDIA CON SOPORTE MULTIIDIOMA (500ms)
        // ====================================================
        async function ejecutarCopia(texto, elementoBoton) {
            // Enviamos el contenido al portapapeles a través de la API nativa de Electron
            await window.api.copiarTexto(texto);
            
            // Leemos el texto de copiar en el idioma activo (es/en) y añadimos el visto bueno
            const palabraCopiar = traducciones[idiomaActual].btnCopiar;
            elementoBoton.innerText = `${palabraCopiar} ✅`;
            elementoBoton.style.borderColor = "#00ff00";

            // Esperamos el tiempo corto configurado (500 milisegundos) y restauramos
            setTimeout(() => {
                elementoBoton.innerText = `${palabraCopiar} 📋`;
                elementoBoton.style.borderColor = "#444";
            }, 500);
        }
    </script>
